

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Evita sobreescribir los módulos del contenedor con los de tu host local
    environment:
      - CHOKIDAR_USEPOLLING=true # Ayuda a que Vite detecte cambios de archivos dentro de Docker en sistemas Linux